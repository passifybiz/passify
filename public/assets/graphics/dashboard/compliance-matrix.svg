      <circle cx="1" cy="1" r="0.3" fill="#E5ECE5"/>
    </pattern>
    <rect width="640" height="240" fill="url(#cm-grid)"/>
  </g>
  <g fill="none" stroke="#E5ECE5" stroke-width="0.5" opacity="0.3">
