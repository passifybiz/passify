    <rect x="180" y="100" width="120" height="40" rx="4" stroke="#E5ECE5" stroke-width="0.5" fill="white" fill-opacity="0.4"/>
    <rect x="320" y="100" width="120" height="40" rx="4" stroke="#E5ECE5" stroke-width="0.5" fill="white" fill-opacity="0.4"/>
    <rect x="460" y="100" width="140" height="40" rx="4" stroke="#E5ECE5" stroke-width="0.5" fill="white" fill-opacity="0.4"/>
  </g>
  <g opacity="0.12">
