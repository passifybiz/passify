    <circle cx="240" cy="60" r="3" fill="#14532D"/>
    <circle cx="380" cy="60" r="3" fill="#14532D"/>
    <circle cx="530" cy="60" r="3" fill="#14532D"/>
  </g>
  <g opacity="0.12">
