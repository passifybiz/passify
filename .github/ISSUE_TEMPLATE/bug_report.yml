name: Bug report
description: Report reproducible broken behavior in Passify or the SDK.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues
        first. Do **not** report security vulnerabilities here — see SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
      placeholder: |
        1. Call `passify.kyc.start(...)` with ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error, status code, and `requestId` if present. Redact secrets.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - SDK (@passify/sdk)
        - Dashboard
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SDK version and/or commit SHA, and Node.js version.
      placeholder: "@passify/sdk 1.0.0, Node 22.3.0"
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
