name: Feature request
description: Propose a new capability or an improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For large changes, please open a Discussion
        first so we can align on the approach before implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - SDK (@passify/sdk)
        - Dashboard
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
